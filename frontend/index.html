<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SQL Analytics</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <header class="topbar">
          <div>
            <h1>SQL Analytics</h1>
            <p id="status">Ready</p>
          </div>

        </header>

        <section id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            <div class="bubble">
              Ask a database question. The report streams as Markdown.
            </div>
          </article>
        </section>

        <form id="form" class="composer">
          <textarea
            id="query"
            rows="2"
            placeholder="list top 10 routes"
            required
          ></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
